services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: calenmind
      POSTGRES_PASSWORD: calenmind
      POSTGRES_DB: calenmind
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calenmind"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    environment:
      # Inside the Docker network the DB hostname is `db`, not `localhost:5433`
      DATABASE_URL: postgresql+asyncpg://calenmind:calenmind@db:5432/calenmind
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    env_file: .env
    environment:
      BACKEND_BASE_URL: http://backend:8000
    depends_on:
      - backend
    command: python -m bot.app

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://calenmind:calenmind@db:5432/calenmind
      BACKEND_BASE_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
